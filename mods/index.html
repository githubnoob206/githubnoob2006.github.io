<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Downloads</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .blue {
            background-color: #2196f3;
        }

        .red {
            background-color: #f44336;
        }
    </style>
</head>
<body>
    <h1>Choose a Mod</h1>

    <div class="button-container">
        <a href="https://www.google.com" class="btn blue">
            Mod One (Sodium)
        </a>

        <a href="https://www.google.com" class="btn red">
            Mod Two (Proximity Chat)
        </a>
    </div>
</body>
</html>
