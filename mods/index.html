<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Downloads</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #1e1e1e;
            font-family: Arial, sans-serif;
            color: white;
        }

        h1 {
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            gap: 20px;
        }

        .download-btn {
            text-decoration: none;
        }

        .download-btn button {
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .download-btn button:hover {
            transform: scale(1.05);
        }

        .sodium {
            background-color: #2196f3;
        }

        .proximity {
            background-color: #f44336;
        }

        .fabric {
            background-color: #008000;
        }
    
    </style>
</head>
<body>

    <h1>install to play serv</h1>

    <div class="button-container">
        <a class="download-btn" href="sodium-fabric-0.8.12+mc26.1.2.jar" download="sodium-fabric-0.8.12+mc26.1.2.jar">
            <button class="sodium">Mod One (Sodium)</button>
        </a>

        <a class="download-btn" href="plasmovoice-fabric-26.1-2.1.9.jar" download="plasmovoice-fabric-26.1-2.1.9.jar">
            <button class="proximity">Mod Two (Proximity Chat)</button>
        </a>

        <a class="download-btn" href="fabric-api-0.151.0+26.1.2.jar" download="fabric-api-0.151.0+26.1.2.jar">
            <button class="fabric">Mod Three (Fabric API)</button>
        </a>
        
    </div>

</body>
</html>
